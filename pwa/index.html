<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>bridge</title>
  <meta name="theme-color" content="#FAF5EC">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="bridge">
  <link rel="manifest" href="/manifest.webmanifest">
  <link rel="apple-touch-icon" href="/icons/icon-180.png">
  <link rel="icon" href="/icons/icon-192.png">
  <link rel="stylesheet" href="/style.css">
</head>
<body>
  <div id="pair-screen" class="hidden">
    <div class="pair-box">
      <img class="pair-logo" src="/icons/icon-192.png" alt="" width="72" height="72">
      <h1>bridge</h1>
      <p>Run <code>bridge pair</code> in a terminal,<br>then enter the code shown there.</p>
      <input id="pair-code" inputmode="numeric" autocomplete="one-time-code"
             maxlength="6" placeholder="000000">
      <button id="pair-btn">Pair this device</button>
      <p id="pair-error" class="error hidden">That code didn’t work — codes expire after 10 minutes.</p>
    </div>
  </div>

  <div id="app" class="hidden">
    <!-- Shared strips (sit under the notch, above whichever view is showing). -->
    <div id="conn-banner" class="banner hidden"></div>
    <button id="enable-push" class="hidden">🔔 Tap to enable notifications</button>

    <!-- The scenery layer: the Golden Gate under an ivory veil, fog drifting
         on the marine-layer schedule. Fixed full-bleed (edge to edge, under
         the status bar and home indicator — Hrishi circled the seams), but
         visible ONLY on the list view via data-view: threads stay on solid
         ground for maximum legibility (both field lessons, 2026-07-06). -->
    <div id="scenery" aria-hidden="true">
      <span class="veil"></span>
      <span class="fog f1"></span><span class="fog f2"></span><span class="fog f3"></span>
    </div>

    <!-- LIST VIEW — the conversation list; the home screen. -->
    <section id="list-view">
      <header class="list-header">
        <img class="brand-logo" src="/icons/icon-192.png" alt="" width="30" height="30">
        <span class="brand-name">bridge</span>
        <span id="conn-dot" class="dot" title="connection"></span>
        <button id="settings-btn" title="settings">⚙</button>
      </header>
      <div id="contact-list"></div>
      <div id="list-empty" class="hidden">
        <p class="empty-title">No conversations yet</p>
        <p>Tell your Claude:<br><em>“use bridge so we can text”</em></p>
      </div>
    </section>

    <!-- THREAD VIEW — one conversation (the existing chat UI, re-homed). -->
    <section id="thread-view" class="hidden">
      <header class="thread-header">
        <button id="back-btn" aria-label="Back to conversations">‹</button>
        <div class="thread-id">
          <span id="thread-name"></span>
          <span id="thread-status" class="thread-status"></span>
        </div>
        <!-- Interrupt: a bare Escape to the agent — stop mid-thought. Visible
             whenever the contact is live (health can lag; the need can't). -->
        <button id="stop-btn" class="hidden" aria-label="Interrupt">⏹</button>
        <span id="conn-dot2" class="dot" title="connection"></span>
      </header>
      <button id="attn-banner" class="hidden"></button>
      <main id="feed"></main>
      <footer>
        <div id="attach-preview" class="hidden">
          <img id="attach-thumb" alt="">
          <button id="attach-remove">✕</button>
        </div>
        <div id="composer">
          <button id="attach-btn" title="send a photo">📷</button>
          <input id="attach-input" type="file" accept="image/*" class="hidden">
          <!-- The focus dance in app.js suppresses iOS's keyboard accessory
               bar (single-focusable-element rule). Autocorrect and QuickType
               stay on by user preference. -->
          <textarea id="msg-input" rows="1" placeholder="Message a contact…"
                    autocomplete="off" inputmode="text"></textarea>
          <button id="send-btn">↑</button>
        </div>
      </footer>
    </section>

    <!-- SETTINGS — slide-up sheet over either view (theme + notifications). -->
    <div id="settings-sheet" class="sheet hidden">
      <div class="sheet-backdrop" id="settings-backdrop"></div>
      <div class="sheet-panel">
        <div class="sheet-grip"></div>
        <div class="sheet-header">
          <span class="sheet-title">Settings</span>
          <button id="settings-close">Done</button>
        </div>
        <div class="sheet-label">Theme</div>
        <div id="theme-options"></div>
        <div class="sheet-label">Background</div>
        <div id="wallpaper-options"></div>
        <div class="sheet-label">Notifications</div>
        <button id="notif-row" class="sheet-row"><span id="notif-state"></span></button>
      </div>
    </div>
  </div>

  <script src="/app.js"></script>
</body>
</html>
